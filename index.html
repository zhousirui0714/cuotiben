<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工科数学分析错题本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .logo span {
            color: #764ba2;
        }

        nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
            color: #666;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 500;
        }

        nav a:hover, nav a.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .main-content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            min-height: 500px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .card-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .tag-warning {
            background: #fff3e0;
            color: #f57c00;
        }

        .tag-danger {
            background: #ffebee;
            color: #d32f2f;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            nav {
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">📚 工科数学<span>错题本</span></div>
                <nav>
                    <a href="#" class="active" onclick="showPage('home')">首页</a>
                    <a href="#" onclick="showPage('add')">录入错题</a>
                    <a href="#" onclick="showPage('list')">错题列表</a>
                    <a href="#" onclick="showPage('stats')">进度统计</a>
                </nav>
            </div>
        </header>

        <div class="main-content" id="main-content">
            <!-- 首页内容 -->
            <div id="page-home">
                <div style="text-align: center; padding: 40px 20px;">
                    <h1 style="font-size: 36px; margin-bottom: 20px; color: #333;">🎯 工科数学分析错题本</h1>
                    <p style="font-size: 18px; color: #666; margin-bottom: 40px; line-height: 1.6;">
                        专为工科大一下学生设计<br>
                        系统化整理错题，告别重复犯错，高效复习提升
                    </p>

                    <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 50px;">
                        <button class="btn" style="font-size: 18px; padding: 15px 30px;" onclick="showPage('add')">
                            ✏️ 录入错题
                        </button>
                        <button class="btn btn-secondary" style="font-size: 18px; padding: 15px 30px;" onclick="showPage('list')">
                            📋 查看错题
                        </button>
                    </div>

                    <div class="stats-grid" style="max-width: 900px; margin: 0 auto;">
                        <div class="stat-card">
                            <div class="stat-number" id="total-count">0</div>
                            <div class="stat-label">总错题数</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                            <div class="stat-number" id="not-mastered-count">0</div>
                            <div class="stat-label">待掌握</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                            <div class="stat-number" id="reviewing-count">0</div>
                            <div class="stat-label">复习中</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                            <div class="stat-number" id="mastered-count">0</div>
                            <div class="stat-label">已掌握</div>
                        </div>
                    </div>

                    <div style="margin-top: 50px; text-align: left; max-width: 800px; margin-left: auto; margin-right: auto;">
                        <h2 style="font-size: 24px; margin-bottom: 20px; color: #333;">✨ 核心功能</h2>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                            <div class="card">
                                <div class="card-title">📷 拍照录入</div>
                                <p style="color: #666;">支持拍照或上传图片，快速记录错题</p>
                            </div>
                            <div class="card">
                                <div class="card-title">🏷️ 智能分类</div>
                                <p style="color: #666;">按知识点、题型自动分类，方便查找</p>
                            </div>
                            <div class="card">
                                <div class="card-title">📊 进度追踪</div>
                                <p style="color: #666;">实时统计掌握程度，可视化学习进度</p>
                            </div>
                            <div class="card">
                                <div class="card-title">🔄 复习提醒</div>
                                <p style="color: #666;">智能提醒易错点，避免重复犯错</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 录入错题页面 -->
            <div id="page-add" style="display: none;">
                <h2 style="margin-bottom: 30px; color: #333;">✏️ 录入新错题</h2>
                <form id="mistake-form">
                    <div class="form-group">
                        <label>题目标题 *</label>
                        <input type="text" id="title" required placeholder="例如：极限计算错误">
                    </div>

                    <div class="form-group">
                        <label>题目内容</label>
                        <textarea id="question_text" placeholder="输入题目内容..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>错误原因 *</label>
                        <textarea id="error_reason" required placeholder="分析错误原因..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>解答过程</label>
                        <textarea id="answer_text" placeholder="输入正确解答..."></textarea>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>知识点 *</label>
                            <select id="knowledge_point" required>
                                <option value="">选择知识点</option>
                                <option value="函数极限">函数极限</option>
                                <option value="数列极限">数列极限</option>
                                <option value="连续性">连续性</option>
                                <option value="导数定义">导数定义</option>
                                <option value="求导法则">求导法则</option>
                                <option value="微分中值定理">微分中值定理</option>
                                <option value="不定积分">不定积分</option>
                                <option value="定积分">定积分</option>
                                <option value="重积分">重积分</option>
                                <option value="级数收敛">级数收敛</option>
                                <option value="幂级数">幂级数</option>
                                <option value="傅里叶级数">傅里叶级数</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>题型 *</label>
                            <select id="question_type" required>
                                <option value="">选择题型</option>
                                <option value="计算题">计算题</option>
                                <option value="证明题">证明题</option>
                                <option value="概念题">概念题</option>
                                <option value="应用题">应用题</option>
                                <option value="选择题">选择题</option>
                                <option value="填空题">填空题</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>掌握程度</label>
                        <select id="mastery_level">
                            <option value="not_mastered">未掌握</option>
                            <option value="reviewing">复习中</option>
                            <option value="mastered">已掌握</option>
                        </select>
                    </div>

                    <div style="display: flex; gap: 15px; margin-top: 30px;">
                        <button type="submit" class="btn">💾 保存错题</button>
                        <button type="button" class="btn btn-secondary" onclick="showPage('home')">取消</button>
                    </div>
                </form>
            </div>

            <!-- 错题列表页面 -->
            <div id="page-list" style="display: none;">
                <h2 style="margin-bottom: 30px; color: #333;">📋 错题列表</h2>
                
                <div class="filter-bar">
                    <select id="filter-knowledge">
                        <option value="">所有知识点</option>
                        <option value="函数极限">函数极限</option>
                        <option value="数列极限">数列极限</option>
                        <option value="连续性">连续性</option>
                        <option value="导数定义">导数定义</option>
                        <option value="求导法则">求导法则</option>
                        <option value="微分中值定理">微分中值定理</option>
                        <option value="不定积分">不定积分</option>
                        <option value="定积分">定积分</option>
                        <option value="重积分">重积分</option>
                        <option value="级数收敛">级数收敛</option>
                        <option value="幂级数">幂级数</option>
                        <option value="傅里叶级数">傅里叶级数</option>
                    </select>
                    <select id="filter-type">
                        <option value="">所有题型</option>
                        <option value="计算题">计算题</option>
                        <option value="证明题">证明题</option>
                        <option value="概念题">概念题</option>
                        <option value="应用题">应用题</option>
                        <option value="选择题">选择题</option>
                        <option value="填空题">填空题</option>
                    </select>
                    <select id="filter-mastery">
                        <option value="">所有状态</option>
                        <option value="not_mastered">未掌握</option>
                        <option value="reviewing">复习中</option>
                        <option value="mastered">已掌握</option>
                    </select>
                    <button class="btn" onclick="filterMistakes()">筛选</button>
                </div>

                <div id="mistakes-container">
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>暂无错题记录</p>
                        <button class="btn" onclick="showPage('add')" style="margin-top: 20px;">录入第一道错题</button>
                    </div>
                </div>
            </div>

            <!-- 统计页面 -->
            <div id="page-stats" style="display: none;">
                <h2 style="margin-bottom: 30px; color: #333;">📊 学习进度统计</h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="stats-total">0</div>
                        <div class="stat-label">总错题数</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                        <div class="stat-number" id="stats-not-mastered">0</div>
                        <div class="stat-label">待掌握</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                        <div class="stat-number" id="stats-reviewing">0</div>
                        <div class="stat-label">复习中</div>
                    </div>
                    <div class="stat-card" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                        <div class="stat-number" id="stats-mastered">0</div>
                        <div class="stat-label">已掌握</div>
                    </div>
                </div>

                <div style="margin-top: 40px;">
                    <h3 style="margin-bottom: 20px; color: #333;">知识点分布</h3>
                    <div id="knowledge-stats"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://rjwkslzdoezjbbcueghk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqd2tzbHpkb2V6amJiY3VlZ2hrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTQyNDUsImV4cCI6MjA4OTEzMDI0NX0.govnpaGlRD_WkFQQ7l3c1p0_A63t4w_qqlnhixc57rI';

        // 存储错题数据
        let mistakes = JSON.parse(localStorage.getItem('mistakes') || '[]');

        // 页面切换
        function showPage(page) {
            document.querySelectorAll('[id^="page-"]').forEach(el => el.style.display = 'none');
            document.getElementById('page-' + page).style.display = 'block';
            
            document.querySelectorAll('nav a').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');

            if (page === 'list') loadMistakes();
            if (page === 'stats') loadStats();
            if (page === 'home') loadHomeStats();
        }

        // 保存错题
        document.getElementById('mistake-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const mistake = {
                id: Date.now(),
                title: document.getElementById('title').value,
                question_text: document.getElementById('question_text').value,
                error_reason: document.getElementById('error_reason').value,
                answer_text: document.getElementById('answer_text').value,
                knowledge_point: document.getElementById('knowledge_point').value,
                question_type: document.getElementById('question_type').value,
                mastery_level: document.getElementById('mastery_level').value,
                created_at: new Date().toISOString()
            };

            mistakes.push(mistake);
            localStorage.setItem('mistakes', JSON.stringify(mistakes));

            alert('✅ 错题保存成功！');
            document.getElementById('mistake-form').reset();
            showPage('home');
        });

        // 加载错题列表
        function loadMistakes() {
            const container = document.getElementById('mistakes-container');
            
            if (mistakes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>暂无错题记录</p>
                        <button class="btn" onclick="showPage('add')" style="margin-top: 20px;">录入第一道错题</button>
                    </div>
                `;
                return;
            }

            const filterKnowledge = document.getElementById('filter-knowledge').value;
            const filterType = document.getElementById('filter-type').value;
            const filterMastery = document.getElementById('filter-mastery').value;

            let filtered = mistakes.filter(m => {
                if (filterKnowledge && m.knowledge_point !== filterKnowledge) return false;
                if (filterType && m.question_type !== filterType) return false;
                if (filterMastery && m.mastery_level !== filterMastery) return false;
                return true;
            });

            container.innerHTML = filtered.map(m => `
                <div class="card">
                    <div class="card-title">${m.title}</div>
                    <div class="card-meta">
                        <span class="tag">${m.knowledge_point}</span>
                        <span class="tag">${m.question_type}</span>
                        <span class="tag ${m.mastery_level === 'mastered' ? 'tag-success' : m.mastery_level === 'reviewing' ? 'tag-warning' : 'tag-danger'}">
                            ${m.mastery_level === 'mastered' ? '已掌握' : m.mastery_level === 'reviewing' ? '复习中' : '未掌握'}
                        </span>
                    </div>
                    <p style="color: #666; margin-bottom: 10px;"><strong>错误原因：</strong>${m.error_reason}</p>
                    <button class="btn" style="padding: 8px 16px; font-size: 14px;" onclick="deleteMistake(${m.id})">删除</button>
                </div>
            `).join('');
        }

        // 删除错题
        function deleteMistake(id) {
            if (confirm('确定要删除这道错题吗？')) {
                mistakes = mistakes.filter(m => m.id !== id);
                localStorage.setItem('mistakes', JSON.stringify(mistakes));
                loadMistakes();
            }
        }

        // 筛选错题
        function filterMistakes() {
            loadMistakes();
        }

        // 加载统计
        function loadStats() {
            document.getElementById('stats-total').textContent = mistakes.length;
            document.getElementById('stats-not-mastered').textContent = mistakes.filter(m => m.mastery_level === 'not_mastered').length;
            document.getElementById('stats-reviewing').textContent = mistakes.filter(m => m.mastery_level === 'reviewing').length;
            document.getElementById('stats-mastered').textContent = mistakes.filter(m => m.mastery_level === 'mastered').length;

            // 知识点统计
            const knowledgeCount = {};
            mistakes.forEach(m => {
                knowledgeCount[m.knowledge_point] = (knowledgeCount[m.knowledge_point] || 0) + 1;
            });

            const knowledgeStats = document.getElementById('knowledge-stats');
            if (Object.keys(knowledgeCount).length === 0) {
                knowledgeStats.innerHTML = '<p style="color: #999; text-align: center;">暂无数据</p>';
            } else {
                knowledgeStats.innerHTML = Object.entries(knowledgeCount).map(([k, v]) => `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f8f9fa; border-radius: 8px; margin-bottom: 10px;">
                        <span>${k}</span>
                        <span class="tag">${v} 道错题</span>
                    </div>
                `).join('');
            }
        }

        // 加载首页统计
        function loadHomeStats() {
            document.getElementById('total-count').textContent = mistakes.length;
            document.getElementById('not-mastered-count').textContent = mistakes.filter(m => m.mastery_level === 'not_mastered').length;
            document.getElementById('reviewing-count').textContent = mistakes.filter(m => m.mastery_level === 'reviewing').length;
            document.getElementById('mastered-count').textContent = mistakes.filter(m => m.mastery_level === 'mastered').length;
        }

        // 初始化
        loadHomeStats();
    </script>
</body>
</html>
